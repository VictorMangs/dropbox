$kind: http-request
description: Creates a new upload session. Returns a session `id` and `createdAt` timestamp. The session ID is automatically stored as a collection variable `sessionId` for use in subsequent file upload requests.
url: "{{baseURL}}/upload-sessions"
method: POST
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response has id field (string)", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData.id).to.be.a("string");
      });

      pm.test("Response has createdAt field", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("createdAt");
      });

      // Store sessionId for subsequent requests
      var jsonData = pm.response.json();
      pm.collectionVariables.set("sessionId", jsonData.id);
    language: text/javascript
order: 1000
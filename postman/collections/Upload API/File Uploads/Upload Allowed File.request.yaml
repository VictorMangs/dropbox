$kind: http-request
description: "Uploads a .txt file to the session. Expected validationState: 'allowed'. Attach a .txt file to the `file` field before sending."
url: "{{baseURL}}/upload-sessions/{{sessionId}}/files"
method: POST
body:
  type: formdata
  content:
    - type: file
      key: file
      src: ""
      description: Attach a .txt file here (e.g. readme.txt)
    - type: text
      key: relativePath
      value: docs/readme.txt
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("validationState equals 'allowed'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.validationState).to.eql("allowed");
      });

      pm.test("validationMessage equals 'Approved'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.validationMessage).to.eql("Approved");
      });

      pm.test("Response has required FileRecord fields", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("sessionId");
          pm.expect(jsonData).to.have.property("originalName");
          pm.expect(jsonData).to.have.property("extension");
          pm.expect(jsonData).to.have.property("storedPath");
          pm.expect(jsonData).to.have.property("createdAt");
      });

      pm.test("extension equals '.txt'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.extension).to.eql(".txt");
      });
    language: text/javascript
order: 1000

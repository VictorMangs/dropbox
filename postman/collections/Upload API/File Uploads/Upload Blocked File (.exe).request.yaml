$kind: http-request
description: "Uploads a .exe file to the session. Expected validationState: 'blocked'. Attach a .exe file to the `file` field before sending."
url: "{{baseURL}}/upload-sessions/{{sessionId}}/files"
method: POST
body:
  type: formdata
  content:
    - type: file
      key: file
      src: ""
      description: Attach a .exe file here (e.g. virus.exe)
    - type: text
      key: relativePath
      value: malware/virus.exe
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("validationState equals 'blocked'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.validationState).to.eql("blocked");
      });

      pm.test("validationMessage equals 'Blocked extension'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.validationMessage).to.eql("Blocked extension");
      });
    language: text/javascript
order: 2000

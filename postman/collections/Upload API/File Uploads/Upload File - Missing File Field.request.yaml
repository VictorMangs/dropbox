$kind: http-request
description: 'Sends a multipart request without the `file` field. The API throws a BadRequestException and returns HTTP 400 with a NestJS error envelope: { statusCode, message, error }.'
url: "{{baseURL}}/upload-sessions/{{sessionId}}/files"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: relativePath
      value: docs/readme.txt
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has statusCode field equal to 400", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("statusCode");
          pm.expect(jsonData.statusCode).to.eql(400);
      });

      pm.test("Response message contains 'No file uploaded'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.message).to.include("No file uploaded");
      });

      pm.test("Response error field equals 'Bad Request'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.error).to.eql("Bad Request");
      });
    language: text/javascript
order: 4000